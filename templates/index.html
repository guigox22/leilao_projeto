<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Editais - Receita Federal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1e3a8a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        .upload-section { display: flex; gap: 15px; align-items: center; background: #f8fafc; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 6px; margin-bottom: 30px; }
        button { border: none; padding: 12px 20px; font-size: 15px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .btn-extract { background-color: #2563eb; color: white; }
        .btn-extract:hover { background-color: #1d4ed8; }
        .btn-excel { background-color: #16a34a; color: white; display: inline-flex; align-items: center; gap: 8px; }
        .btn-excel:hover { background-color: #115e59; }
        .btn-excel:disabled { background-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        .actions-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #1e3a8a; color: white; font-weight: bold; }
        tr:hover { background-color: #f8fafc; }
        .badge-lote { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .preco-tag { color: #16a34a; font-weight: bold; font-size: 16px; }
        .preco-avaliado { color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Analisador de Editais - Receita Federal</h1>
    <p>Suba o arquivo <b>.docx</b> ou <b>.pdf</b> do edital para extrair lotes, preços e gerar sua planilha Excel automaticamente.</p>
    
    <div class="upload-section">
        <input type="file" id="fileInput" accept=".docx,.pdf">
        <button class="btn-extract" onclick="upload()">⚡ Extrair e Filtrar Lotes</button>
    </div>
    
    <div class="actions-bar">
        <h3>Resultados Obtidos</h3>
        <button id="btnExportar" class="btn-excel" onclick="exportarParaExcel()" disabled>📊 Baixar em Excel</button>
    </div>
    
    <table id="resultado">
        <thead>
            <tr>
                <th style="width: 10%;">Lote</th>
                <th style="width: 20%;">Preço Mínimo</th>
                <th style="width: 20%;">Preço Avaliado</th>
                <th style="width: 50%;">Descrição dos Produtos</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
    let dadosLotes = [];

    async function upload() {
        let fileInput = document.getElementById("fileInput");
        let btnExportar = document.getElementById("btnExportar");
        
        if(fileInput.files.length === 0) {
            alert("Por favor, selecione um arquivo .docx ou .pdf primeiro!");
            return;
        }
        
        let tbody = document.querySelector("#resultado tbody");
        tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>🔄 Processando edital e minerando os preços... Aguarde.</td></tr>";
        btnExportar.disabled = true;
        dadosLotes = [];
        
        let formData = new FormData();
        formData.append("file", fileInput.files[0]);
        
        try {
            let res = await fetch("/upload", { method: "POST", body: formData });
            let data = await res.json();
            
            tbody.innerHTML = "";
            
            if(data.error || data.erro) {
                let msgErro = data.error || data.erro;
                tbody.innerHTML = `<tr><td colspan='4' style='text-align:center; color:red;'>❌ Erro: ${msgErro}</td></tr>`;
                return;
            }
            
            if(!Array.isArray(data) || data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>Nenhum lote válido foi encontrado.</td></tr>";
                return;
            }
            
            dadosLotes = data;
            btnExportar.disabled = false;
            
            data.forEach(item => {
                let valorMinimo = item.preco_minimo || item.preco || "Não encontrado";
                let valorAvaliado = item.preco_avaliado || "Não encontrado";
                let numLote = item.lote || "S/N";
                let descricaoLote = item.descricao || "Sem descrição disponível.";

                tbody.innerHTML += `<tr>
                    <td><span class="badge-lote">Lote ${numLote}</span></td>
                    <td><span class="preco-tag">${valorMinimo}</span></td>
                    <td><span class="preco-avaliado">${valorAvaliado}</span></td>
                    <td style="font-size: 14px; line-height: 1.4;">${descricaoLote}</td>
                </tr>`;
            });
        } catch (error) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>❌ Erro crítico de conexão com o servidor.</td></tr>";
        }
    }

    function exportarParaExcel() {
        if(dadosLotes.length === 0) return;

        let htmlExcel = `
            <meta charset="utf-8">
            <table border="1">
                <tr style="background-color: #1e3a8a; color: white; font-weight: bold;">
                    <th>Lote</th>
                    <th>Preco Minimo</th>
                    <th>Preco Avaliado</th>
                    <th>Descricao dos Produtos</th>
                </tr>
        `;

        dadosLotes.forEach(item => {
            let valorMinimo = item.preco_minimo || item.preco || "Não encontrado";
            let valorAvaliado = item.preco_avaliado || "Não encontrado";
            let numLote = item.lote || "S/N";
            let descricaoLote = item.descricao || "Sem descrição disponível.";

            htmlExcel += `
                <tr>
                    <td>Lote ${numLote}</td>
                    <td>${valorMinimo}</td>
                    <td>${valorAvaliado}</td>
                    <td>${descricaoLote}</td>
                </tr>
            `;
        });

        htmlExcel += "</table>";

        let blob = new Blob([htmlExcel], { type: "application/vnd.ms-excel" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        
        let dataAtual = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
        a.href = url;
        a.download = `Lotes_Receita_Federal_${dataAtual}.xls`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
